name: "Run Tests with uv"

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - 'release/*'
  pull_request:
    branches:
      - main
      - 'release/*'
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11", "3.12", "3.13" ]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Test with pytest
        run: uv run pytest -m "not gui"

  coverage-badge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Generate coverage report
        run: |
          uv run pytest -m "not gui" --cov=pandera_catalog --cov-report=term-missing --cov-report=xml --cov-fail-under=60

      - name: Generate coverage badge
        uses: tj-actions/coverage-badge-py@v2
        with:
          output: badges/coverage.svg

      - name: Ensure destination directory and copy badge
        run: |
          mkdir -p docs/_static/badges
          cp badges/coverage.svg docs/_static/badges/coverage.svg

      - name: Upload coverage badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: docs/_static/badges/coverage.svg

      - name: Commit and push coverage badge
        if: github.event_name == 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/_static/badges/coverage.svg
          git commit -m "Update coverage badge [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
